<!DOCTYPE html>
<html>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function draw(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.15);
  ctx.fill();
  // Book emoji
  ctx.font = `${s * 0.5}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('📚', s/2, s * 0.42);
  // Text
  ctx.fillStyle = '#e94560';
  ctx.font = `bold ${s * 0.14}px sans-serif`;
  ctx.fillText('Học Hình', s/2, s * 0.78);
}
draw(document.getElementById('c192'));
draw(document.getElementById('c512'));

// Download
['c192','c512'].forEach(id => {
  const c = document.getElementById(id);
  const a = document.createElement('a');
  a.download = `icon-${c.width}.png`;
  a.href = c.toDataURL('image/png');
  a.click();
});
</script>
</body>
</html>
